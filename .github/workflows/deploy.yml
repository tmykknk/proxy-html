name: Lint and Deploy

on:
  push:
    branches:
      - feature/gha-test

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # 1. 構文チェックジョブ
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Check PHP Syntax Error
        run: |
          if [ -f index.php ]; then
            php -l index.php
          fi

  # 2. デプロイジョブ
  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/proxy/
          local-dir: ./
          include: |
            index.html
            index.php
            style.css
            main.js
