name: Lint and Deploy

on:
  push:
    branches:
      - feature/gha-test

jobs:
  # 1. 構文チェックジョブ（PCにPHPがない代わりにGHA側でテストする）
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Check PHP Syntax Error
        run: |
          if [ -f index.php ]; then
            php -l index.php
          fi

  # 2. デプロイジョブ（構文チェックが成功したら動く）
  deploy:
    needs: lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: "just-a-placeholder"
          if_key_exists: replace

      - name: Scan SSH Host Keys
        run: |
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avzn --delete \
            --include='index.html' \
            --include='index.php' \
            --include='style.css' \
            --include='main.js' \
            --exclude='*' \
            ./ ${{ secrets.USER }}@${{ secrets.HOST }}:~/public_html/proxy/
